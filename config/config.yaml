# Specify the root dir
artifacts_root: artifacts

# data ingestion dir and unzip dir
data_ingestion:
  root_dir: artifacts/data_ingestion
  source_url: https://drive.google.com/file/d/1sk4kp57TBwY6DeTX1b7lRQvcSyW8AyLk/view?usp=sharing
  local_data_file: artifacts/data_ingestion/dataset.zip
  unzip_dir: artifacts/data_ingestion/kidney_ct_scan_dataset

# base model preparation configuration
prepare_base_model:
  root_dir: artifacts/prepare_base_model
  base_model_path: artifacts/prepare_base_model/base_model.h5
  updated_base_model_path: artifacts/prepare_base_model/updated_base_model.h5

# for training the model
training:
  root_dir: artifacts/training
  trained_model_path: artifacts/training/model.h5